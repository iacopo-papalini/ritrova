{# Person face grid fragment -- returned by /api/persons/{id}/faces-html for htmx infinite scroll #}
{% for group in face_groups %}
<h3 class="mt-4 mb-2 text-sm font-medium text-gallery-muted">{{ group.month }}</h3>
<div class="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 lg:grid-cols-14 gap-1.5">
  {% for face in group.faces %}
  <div class="group relative overflow-hidden rounded-lg transition-all duration-150 hover:scale-[1.03]">
    <img src="/api/faces/{{ face.id }}/thumbnail?size=180"
         loading="lazy"
         alt="face"
         @click="$store.lightbox.show({{ face.photo_id }})"
         class="aspect-square w-full cursor-pointer object-cover">
    <button @click.stop="if(confirm('Remove this face?'))
              fetch('/api/faces/' + {{ face.id }} + '/unassign', { method: 'POST' })
                .then(r => { if(r.ok) $el.closest('.group').remove() })"
            class="absolute top-1 right-1 z-10 hidden group-hover:flex h-6 w-6 items-center justify-center
                   rounded-full bg-black/60 text-gallery-text transition-colors hover:bg-gallery-danger hover:text-white"
            title="Not this person">
      <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
      </svg>
    </button>
  </div>
  {% endfor %}
</div>
{% endfor %}
{% if offset + faces_count < total %}
<div hx-get="/api/persons/{{ person_id }}/faces-html?offset={{ offset + faces_count }}&limit={{ limit }}"
     hx-trigger="revealed"
     hx-swap="outerHTML"
     class="flex justify-center py-8">
  <div class="flex items-center gap-2 text-gallery-muted text-sm">
    <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
    <span>Loading more faces...</span>
  </div>
</div>
{% endif %}
