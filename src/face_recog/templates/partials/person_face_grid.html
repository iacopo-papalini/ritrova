{# Person face grid fragment -- returned by /api/persons/{id}/faces-html for htmx infinite scroll #}
{% for face in faces %}
<div class="relative overflow-hidden rounded-lg transition-all duration-150 hover:scale-[1.03]">
  <img src="/api/faces/{{ face.id }}/thumbnail?size=180"
       loading="lazy"
       alt="face"
       @click="$store.lightbox.show({{ face.photo_id }})"
       class="aspect-square w-full cursor-pointer object-cover">
</div>
{% endfor %}
{% if offset + faces|length < total %}
<div hx-get="/api/persons/{{ person_id }}/faces-html?offset={{ offset + faces|length }}&limit={{ limit }}"
     hx-trigger="revealed"
     hx-swap="outerHTML"
     class="col-span-full flex justify-center py-8">
  <div class="flex items-center gap-2 text-gallery-muted text-sm">
    <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
    <span>Loading more faces...</span>
  </div>
</div>
{% endif %}
