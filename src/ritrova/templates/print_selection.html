{% extends "base.html" %}
{% block title %}Ritrova — Print{% endblock %}
{% block content %}
<div class="space-y-6" x-data="printSelectionPage({ count: {{ items|length }} })">
  <div class="flex flex-wrap items-center gap-3">
    <div>
      <h1 class="font-display text-2xl font-bold tracking-tight">Print Selection</h1>
      <p class="text-gallery-muted text-sm mt-1">
        <span x-text="count"></span>
        <span x-text="count === 1 ? 'photo selected' : 'photos selected'"></span>
      </p>
    </div>
    <div class="flex-1"></div>
    <form method="post" action="/api/print-selection/export">
      <button type="submit"
              :disabled="count === 0"
              class="inline-flex items-center gap-2 rounded-lg bg-gallery-accent px-4 py-2 text-sm font-semibold
                     text-gallery-bg transition-colors hover:bg-gallery-accent/80 disabled:cursor-not-allowed disabled:opacity-40">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
          <path d="M3 4a2 2 0 012-2h10a2 2 0 012 2v3H3V4z" />
          <path fill-rule="evenodd" d="M3 9h14v7a2 2 0 01-2 2H5a2 2 0 01-2-2V9zm5 2a1 1 0 100 2h4a1 1 0 100-2H8z" clip-rule="evenodd" />
        </svg>
        Download zip
      </button>
    </form>
    <button type="button"
            :disabled="count === 0"
            @click="clearAll()"
            class="inline-flex items-center gap-2 rounded-lg border border-gallery-border bg-gallery-card px-4 py-2 text-sm
                   font-medium text-gallery-muted transition-colors hover:border-gallery-danger hover:text-gallery-danger
                   disabled:cursor-not-allowed disabled:opacity-40">
      Clear
    </button>
  </div>

  <p x-show="count === 0" x-cloak class="text-gallery-muted text-sm py-8 text-center">
    No photos selected for print.
  </p>

  <div x-show="count > 0" x-cloak data-print-grid
       class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
    {% for item in items %}
    {% set source = item.source %}
    <div class="group relative overflow-hidden rounded-xl bg-gallery-card"
         data-print-source-id="{{ source.id }}">
      <img src="/api/sources/{{ source.id }}/image?max_size=400"
           loading="lazy"
           alt="photo"
           class="aspect-[4/3] w-full object-cover">
      <div data-print-position
           class="absolute left-2 top-2 rounded-full bg-black/70 px-2 py-0.5 text-xs font-semibold text-gallery-text">
        {{ '%04d'|format(loop.index) }}
      </div>
      <div class="absolute right-2 top-2 flex gap-1">
        <button type="button"
                data-print-move="up"
                @click="move($el, -1)"
                class="flex h-8 w-8 items-center justify-center rounded-full bg-black/70 text-gallery-text
                       transition-colors hover:bg-gallery-accent hover:text-gallery-bg disabled:cursor-not-allowed disabled:opacity-30"
                title="Move earlier">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 4a1 1 0 01.707.293l4 4a1 1 0 01-1.414 1.414L11 7.414V15a1 1 0 11-2 0V7.414L6.707 9.707a1 1 0 01-1.414-1.414l4-4A1 1 0 0110 4z" clip-rule="evenodd" />
          </svg>
        </button>
        <button type="button"
                data-print-move="down"
                @click="move($el, 1)"
                class="flex h-8 w-8 items-center justify-center rounded-full bg-black/70 text-gallery-text
                       transition-colors hover:bg-gallery-accent hover:text-gallery-bg disabled:cursor-not-allowed disabled:opacity-30"
                title="Move later">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 16a1 1 0 01-.707-.293l-4-4a1 1 0 111.414-1.414L9 12.586V5a1 1 0 112 0v7.586l2.293-2.293a1 1 0 011.414 1.414l-4 4A1 1 0 0110 16z" clip-rule="evenodd" />
          </svg>
        </button>
        <button type="button"
                @click="remove({{ source.id }})"
                class="flex h-8 w-8 items-center justify-center rounded-full bg-black/70
                       text-gallery-text transition-colors hover:bg-gallery-danger"
                title="Remove from print selection">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
          </svg>
        </button>
      </div>
      <div class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 to-transparent px-2 py-1.5">
        <p class="truncate text-xs text-gallery-text/90">{{ source.file_path.split('/')[-1] }}</p>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
