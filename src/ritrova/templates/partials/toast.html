{# Toast stack — fixed bottom-right. Rendered in base.html.
   Populated by Alpine $store.toast. See app.js for API:
     $store.toast.show({ message, level, action?, duration? })
     $store.toast.error(msg) / success(msg) / info(msg)
#}
<div class="fixed bottom-4 right-4 z-[200] flex flex-col items-end gap-2 pointer-events-none"
     x-data>
  <template x-for="toast in $store.toast.items" :key="toast.id">
    {# When `toast.action` is set (FEAT-5 undo), render a larger, more prominent
       variant: wider min-width and bigger message text so the Undo button pair
       is hard to miss. Plain toasts keep the compact baseline. #}
    <div class="pointer-events-auto flex items-start gap-3 rounded-lg border shadow-xl backdrop-blur-sm"
         :class="{
           'border-gallery-danger/50 bg-gallery-danger/15 text-gallery-danger': toast.level === 'error',
           'border-gallery-accent/50 bg-gallery-accent/15 text-gallery-text': toast.level === 'success',
           'border-gallery-border bg-gallery-card text-gallery-text': toast.level === 'info',
           'min-w-[380px] max-w-lg px-5 py-4': toast.action,
           'min-w-[280px] max-w-md px-4 py-3': !toast.action
         }"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         role="status"
         :aria-live="toast.level === 'error' ? 'assertive' : 'polite'">

      <!-- Level icon -->
      <svg x-show="toast.level === 'error'" class="h-5 w-5 shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
      </svg>
      <svg x-show="toast.level === 'success'" class="h-5 w-5 shrink-0 text-gallery-accent" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
      </svg>
      <svg x-show="toast.level === 'info'" class="h-5 w-5 shrink-0 text-gallery-muted" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
      </svg>

      <!-- Message -->
      <div class="flex-1 leading-snug"
           :class="toast.action ? 'text-base font-medium' : 'text-sm'"
           x-text="toast.message"></div>

      <!-- Optional action button (e.g. Undo). Styled as a real CTA when
           present: solid accent background, bigger text, underlined key
           hint. -->
      <button x-show="toast.action"
              @click="toast.action.onClick(); $store.toast.dismiss(toast.id)"
              class="shrink-0 rounded-md bg-gallery-accent px-4 py-2 text-sm font-semibold text-gallery-bg
                     shadow-sm ring-1 ring-gallery-accent/60 transition-all
                     hover:bg-gallery-accent/90 hover:shadow-md
                     focus:outline-none focus:ring-2 focus:ring-gallery-accent focus:ring-offset-2 focus:ring-offset-gallery-bg"
              x-text="toast.action?.label"></button>

      <!-- Dismiss -->
      <button @click="$store.toast.dismiss(toast.id)"
              class="shrink-0 opacity-70 transition-opacity hover:opacity-100"
              aria-label="Dismiss">
        <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
          <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
  </template>
</div>
