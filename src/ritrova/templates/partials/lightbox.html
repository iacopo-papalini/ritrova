{# Lightbox partial — included inside the full-screen overlay in base.html #}

<!-- Lightbox toolbar — fixed top-right -->
<div class="fixed top-4 right-4 z-[110] flex items-center gap-2">
  <!-- Select for print (photos only) -->
  <button x-show="$store.lightbox.canSelectForPrint"
          @click="$store.lightbox.togglePrintSelection()"
          :class="$store.lightbox.selectedForPrint
                    ? 'bg-gallery-accent text-gallery-bg'
                    : 'bg-black/70 text-gallery-text hover:bg-gallery-accent hover:text-gallery-bg'"
          class="flex h-10 w-10 items-center justify-center rounded-full transition-colors"
          aria-label="Toggle print selection"
          title="Select for print">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M5 4a2 2 0 00-2 2v6a2 2 0 002 2h1v2a1 1 0 102 0v-2h4v2a1 1 0 102 0v-2h1a2 2 0 002-2V6a2 2 0 00-2-2H5zm10 2H5v6h10V6z" clip-rule="evenodd" />
    </svg>
  </button>
  <!-- Download original (resolved from current item's source) -->
  <a x-show="$store.lightbox.downloadUrl"
     :href="$store.lightbox.downloadUrl"
     download
     class="flex h-10 w-10 items-center justify-center rounded-full bg-black/70
            text-gallery-text transition-colors hover:bg-gallery-accent hover:text-gallery-bg"
     aria-label="Download original file"
     title="Download original">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd"
            d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0
               011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414
               1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z"
            clip-rule="evenodd" />
    </svg>
  </a>
  <!-- Open details page (new tab) -->
  <a x-show="$store.lightbox.detailUrl"
     :href="$store.lightbox.detailUrl"
     target="_blank" rel="noopener"
     class="flex h-10 w-10 items-center justify-center rounded-full bg-black/70
            text-gallery-text transition-colors hover:bg-gallery-accent hover:text-gallery-bg"
     aria-label="Open details page in new tab"
     title="Open details page">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z" />
      <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z" />
    </svg>
  </a>
  <!-- Rotate button -->
  <button @click="$store.lightbox.rotate()"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-black/70
                 text-gallery-text transition-colors hover:bg-gallery-accent hover:text-gallery-bg"
          aria-label="Rotate image">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd"
            d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0
               11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0
               01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0
               0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2
               0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"
            clip-rule="evenodd" />
    </svg>
  </button>
  <!-- Close button -->
  <button @click="$store.lightbox.close()"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-black/70
                 text-gallery-text transition-colors hover:bg-gallery-accent hover:text-gallery-bg"
          aria-label="Close lightbox">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd"
            d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0
               111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414
               1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586
               10 4.293 5.707a1 1 0 010-1.414z"
            clip-rule="evenodd" />
    </svg>
  </button>
</div>

<!-- Prev / Next navigation chevrons (visible only when items.length > 1) -->
<button x-show="$store.lightbox.hasNav" x-cloak
        @click.stop="$store.lightbox.prev()"
        :disabled="!$store.lightbox.canPrev"
        class="absolute left-4 top-1/2 -translate-y-1/2 z-[110] flex h-12 w-12 items-center
               justify-center rounded-full bg-black/70 text-gallery-text transition-colors
               hover:bg-gallery-accent hover:text-gallery-bg
               disabled:opacity-30 disabled:cursor-not-allowed disabled:hover:bg-black/70 disabled:hover:text-gallery-text"
        aria-label="Previous">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
    <path fill-rule="evenodd" d="M12.707 5.293a1 1 0 010 1.414L9.414 10l3.293 3.293a1 1 0 01-1.414 1.414l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 0z" clip-rule="evenodd" />
  </svg>
</button>
<button x-show="$store.lightbox.hasNav" x-cloak
        @click.stop="$store.lightbox.next()"
        :disabled="!$store.lightbox.canNext"
        class="absolute right-4 top-1/2 -translate-y-1/2 z-[110] flex h-12 w-12 items-center
               justify-center rounded-full bg-black/70 text-gallery-text transition-colors
               hover:bg-gallery-accent hover:text-gallery-bg
               disabled:opacity-30 disabled:cursor-not-allowed disabled:hover:bg-black/70 disabled:hover:text-gallery-text"
        aria-label="Next">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
    <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
  </svg>
</button>

<!-- Photo + path -->
<div class="flex flex-col items-center gap-3">
  <img :src="$store.lightbox.imageUrl"
       :style="`transform: rotate(${$store.lightbox.rotation}deg); transition: transform 0.3s ease`"
       alt="Full resolution photo"
       class="max-h-[85vh] max-w-[95vw] object-contain rounded-lg shadow-2xl">

  <div class="flex items-center gap-2">
    <p x-show="$store.lightbox.photoPath" x-cloak
       x-text="$store.lightbox.photoPath"
       class="max-w-[90vw] truncate rounded bg-black/70 px-3 py-1.5 text-sm text-gallery-text/80"></p>

    <a x-show="$store.lightbox.latitude" x-cloak
       :href="`https://www.google.com/maps?q=${$store.lightbox.latitude},${$store.lightbox.longitude}`"
       target="_blank" rel="noopener"
       class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-black/70
              text-gallery-accent transition-colors hover:bg-gallery-accent hover:text-gallery-bg"
       title="Open in Google Maps">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
              d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0
                 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"
              clip-rule="evenodd" />
      </svg>
    </a>
  </div>
</div>
