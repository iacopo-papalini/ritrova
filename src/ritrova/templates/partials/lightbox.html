{# Lightbox partial — included inside the full-screen overlay in base.html #}

<!-- Lightbox toolbar — fixed top-right -->
<div class="fixed top-4 right-4 z-[110] flex items-center gap-2">
  <!-- Rotate button -->
  <button @click="$store.lightbox.rotate()"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-black/70
                 text-gallery-text transition-colors hover:bg-gallery-accent hover:text-gallery-bg"
          aria-label="Rotate image">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd"
            d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0
               11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0
               01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0
               0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2
               0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"
            clip-rule="evenodd" />
    </svg>
  </button>
  <!-- Close button -->
  <button @click="$store.lightbox.close()"
          class="flex h-10 w-10 items-center justify-center rounded-full bg-black/70
                 text-gallery-text transition-colors hover:bg-gallery-accent hover:text-gallery-bg"
          aria-label="Close lightbox">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd"
            d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0
               111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414
               1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586
               10 4.293 5.707a1 1 0 010-1.414z"
            clip-rule="evenodd" />
    </svg>
  </button>
</div>

<!-- Photo + path -->
<div class="flex flex-col items-center gap-3">
  <img :src="$store.lightbox.photoId ? `/api/photos/${$store.lightbox.photoId}/image?max_size=1600` : ''"
       :style="`transform: rotate(${$store.lightbox.rotation}deg); transition: transform 0.3s ease`"
       alt="Full resolution photo"
       class="max-h-[85vh] max-w-[95vw] object-contain rounded-lg shadow-2xl">

  <div class="flex items-center gap-2">
    <p x-show="$store.lightbox.photoPath" x-cloak
       x-text="$store.lightbox.photoPath"
       class="max-w-[90vw] truncate rounded bg-black/70 px-3 py-1.5 text-sm text-gallery-text/80"></p>

    <a x-show="$store.lightbox.latitude" x-cloak
       :href="`https://www.google.com/maps?q=${$store.lightbox.latitude},${$store.lightbox.longitude}`"
       target="_blank" rel="noopener"
       class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-black/70
              text-gallery-accent transition-colors hover:bg-gallery-accent hover:text-gallery-bg"
       title="Open in Google Maps">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd"
              d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0
                 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"
              clip-rule="evenodd" />
      </svg>
    </a>
  </div>
</div>
