{# Merge-suggestions page fragment — returned by /api/merge-suggestions-html for htmx infinite scroll #}
{% for s in suggestions %}
{% include "partials/merge_row.html" %}
{% endfor %}
{% if offset + suggestions|length < total %}
<div hx-get="/api/merge-suggestions-html?min_sim={{ min_sim }}&offset={{ offset + suggestions|length }}&limit={{ limit }}&species={{ species }}"
     hx-trigger="revealed"
     hx-swap="outerHTML"
     class="flex justify-center py-8">
  <div class="flex items-center gap-2 text-gallery-muted text-sm">
    <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
    <span>Loading more suggestions...</span>
  </div>
</div>
{% endif %}
