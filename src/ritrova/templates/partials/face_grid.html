{# Face grid fragment -- returned by /api/clusters/{id}/faces-html for htmx infinite scroll #}
{% for face in findings %}
<div class="group relative cursor-pointer overflow-hidden rounded-lg transition-all duration-150"
     data-finding-id="{{ face.id }}"
     @click="tileClick({{ face.id }}, $event)"
     :class="selected.has({{ face.id }}) ? 'ring-2 ring-gallery-accent ring-offset-2 ring-offset-gallery-bg scale-95' : 'hover:scale-[1.03]'">
  <img src="/api/findings/{{ face.id }}/thumbnail?size=180"
       loading="lazy"
       alt="face"
       class="aspect-square w-full object-cover">
  <!-- Preview photo button (visible on hover) -->
  <button @click.stop="$store.lightbox.openFromGrid($el, 'finding')"
          class="absolute top-1 left-1 z-10 hidden group-hover:flex h-6 w-6 items-center justify-center
                 rounded-full bg-black/60 text-gallery-text transition-colors
                 hover:bg-gallery-accent hover:text-gallery-bg"
          title="Preview photo">
    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"/>
    </svg>
  </button>
  <!-- Remove single face button -->
  <button @click.stop="(await confirmDialog({title: 'Remove this face from cluster?', confirmLabel: 'Remove', danger: true})) &&
            fetch('/api/findings/exclude', {
              method: 'POST', headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({face_ids: [{{ face.id }}], cluster_id: {{ cluster_id }}})
            }).then(r => { if(r.ok) $el.closest('.group').remove() })"
          class="absolute top-1 right-1 z-10 hidden group-hover:flex h-6 w-6 items-center justify-center
                 rounded-full bg-black/60 text-gallery-text transition-colors hover:bg-gallery-danger hover:text-white"
          title="Remove from cluster">
    <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
    </svg>
  </button>
  <!-- Selection checkmark overlay -->
  <div x-show="selected.has({{ face.id }})" x-cloak
       class="absolute inset-0 bg-gallery-accent/20 flex items-center justify-center pointer-events-none">
    <svg class="w-8 h-8 text-gallery-accent drop-shadow-lg" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
    </svg>
  </div>
</div>
{% endfor %}
{% if offset + findings|length < total %}
<div hx-get="/api/clusters/{{ cluster_id }}/faces-html?offset={{ offset + findings|length }}&limit={{ limit }}"
     hx-trigger="revealed"
     hx-swap="outerHTML"
     class="col-span-full flex justify-center py-8">
  <div class="flex items-center gap-2 text-gallery-muted text-sm">
    <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
    <span>Loading more faces...</span>
  </div>
</div>
{% endif %}
