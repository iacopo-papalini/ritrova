{% if total == 0 and offset == 0 %}
<p class="text-gallery-muted text-sm py-8 text-center">No sources match these filters.</p>
{% else %}
{% if offset == 0 %}
<p class="text-gallery-muted text-sm mb-4">{{ total }} source{{ 's' if total != 1 else '' }} found</p>
{% endif %}

{% include "partials/source_grid.html" %}

{% if offset + page_count < total %}
<div hx-get="/api/browse-html?{{ next_query }}"
     hx-trigger="intersect once"
     hx-swap="outerHTML"
     class="flex justify-center py-8">
  <div class="flex items-center gap-2 text-gallery-muted text-sm">
    <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
    <span>Loading more sources...</span>
  </div>
</div>
{% endif %}
{% endif %}
